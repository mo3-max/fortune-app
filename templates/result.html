<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星座守護神男子からの言葉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}" type="image/png">
</head>

<body>
    <div class="stars"></div>

    <div class="container">
        <div class="fortune-card">

            <section class="god-intro">
                <p>{{ name }}<br class="sp-only">を守るのは”<strong class="shugoshin-highlight"
                        data-color="{{ shugoshin.color }}">{{ shugoshin.name }}</strong>”だよ</p>
            </section>
            <hr>
            <div class="shugoshin-image">
                <img src="{{ url_for('static', filename='images/' + shugoshin.image) }}" alt="{{ shugoshin.name }}">
            </div>

            <hr>

            <div class="luck-box">
                <p class="luck-text"><strong>【今の君への想い】</strong><br> {{ luck }}</p>
            </div>

            <hr>

            <section class="quote-section">
                <h3>今の君に贈る言葉</h3>
                <p class="quote-text">「{{ meigen }}」</p>
            </section>

            <hr>

            <section class="love-message">
                <h3>{{ shugoshin.name }}からの<br class="sp-only">親愛メッセージ</h3>
                <p class="main-message">{{ shugoshin.message }}</p>
            </section>

            <hr>

            <section class="constellation-info">
                <h3>{{ constellation }}のあなたは</h3>
                <p>{{ shugoshin.feature }}</p>
            </section>

            <hr>

            <div class="btn-container">
                <h3>前に進むあなたに送ります</h3>
                <a href="/quote" class="fortune-btn">今日の神々の名言を見る</a>
            </div>

            <div class="navigation">
                <a href="/" class="back-link">← トップに戻る</a>
            </div>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/sparkle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/result.js') }}"></script>
</body>

</html>
